# =============================================================================
# CodeHub Stability Fix Miner — 配置模板
# Skill 根目录内使用；路径均相对于 skill 文件夹。
# =============================================================================
#
# 快速开始：
#   cd internal-ci-pair-miner
#   export CODEHUB_TOKEN=...
#   ./run_fetch_crs.sh
#
# 产出（skill 目录内）：
#   data/dfr_repair.db
#   output/codehub/<project>-stability-fixes.json
# =============================================================================

codehub:
  type: gitlab
  base_url: https://open.codehub.huawei.com
  api_url: https://open.codehub.huawei.com/api/v4
  project: OpenSourceCenter_CR/openharmony/filemanagement_app_file_service
  token_env: CODEHUB_TOKEN

mining:
  mr_state: merged
  stability_classes:
    - appfreeze
    - jserror
    - jsleak
    - memoryleak
  min_confidence: 0.2

classification:
  keywords:
    appfreeze:
      - appfreeze
      - freeze
      - anr
      - thread_block
      - ui_block
      - 卡死
      - 冻屏
      - 无响应
    jserror:
      - jserror
      - typeerror
      - referenceerror
      - is not callable
      - jscrash
    jsleak:
      - jsleak
      - heapsnapshot
      - heapdump
      - retainer
      - gc root
    memoryleak:
      - memoryleak
      - memory leak
      - oom
      - 内存泄漏

enrichment:
  max_file_lines: 2000
  fetch_file_content: true

database:
  path: data/dfr_repair.db

output:
  dir: output/codehub
